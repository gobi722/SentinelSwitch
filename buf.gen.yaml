# Run from repo root: buf generate
# Requires: buf, protoc-gen-go, protoc-gen-go-grpc
#
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
#   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
#   go install github.com/bufbuild/buf/cmd/buf@latest
#
# Output lands in services/proto-gen/ with module path github.com/sentinelswitch/proto
# (strips the module prefix from each proto's go_package option).

version: v2
plugins:
  - local: protoc-gen-go
    out: services/proto-gen
    opt: module=github.com/sentinelswitch/proto
  - local: protoc-gen-go-grpc
    out: services/proto-gen
    opt: module=github.com/sentinelswitch/proto,require_unimplemented_servers=false