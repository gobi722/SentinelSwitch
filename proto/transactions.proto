// =============================================================================
// SentinelSwitch — Kafka Topic Schema
// Topic  : transactions
// Ticket : CREDO-ALERT-001
// Registry subject : transactions-value
// Compatibility    : BACKWARD
// =============================================================================

syntax = "proto3";

package sentinel.transactions.v1;

option java_package         = "com.sentinelswitch.transactions.v1";
option java_outer_classname = "TransactionProto";
option java_multiple_files  = true;
option go_package           = "github.com/sentinelswitch/proto/transactions/v1";

// Published by : API Gateway → Kafka topic: transactions
// Consumed by  : Fraud Engine
//
// Partition key : card_hash (ensures per-card ordering)
// Key encoding  : string (UTF-8)

message TransactionEvent {

    // ------------------------------------------------------------------
    // Identity
    // ------------------------------------------------------------------
    string txn_id           = 1;  // UUID v4 — generated by API Gateway
    string txn_timestamp    = 2;  // ISO 8601 e.g. "2025-01-15T14:30:00Z"

    // ------------------------------------------------------------------
    // Card (PCI-DSS safe — no raw PAN)
    // ------------------------------------------------------------------
    string card_hash        = 3;  // SHA256(PAN + system_salt), hex 64 chars
    string masked_pan       = 4;  // e.g. "411111XXXXXX1111" — display only

    // ------------------------------------------------------------------
    // Amount (minor currency units to avoid floating-point errors)
    // e.g. OMR 5.250 → amount_minor = 5250, currency = "OMR" (3 decimals)
    //      INR 5000  → amount_minor = 500000, currency = "INR" (2 decimals)
    // ------------------------------------------------------------------
    int64  amount_minor     = 5;
    string currency         = 6;  // ISO 4217 e.g. "OMR", "INR", "USD"

    // ------------------------------------------------------------------
    // Merchant & Terminal
    // ------------------------------------------------------------------
    string merchant_id      = 7;
    string terminal_id      = 8;
    string mcc              = 9;  // ISO 18245 4-digit code e.g. "5411"

    // ------------------------------------------------------------------
    // Transaction Classification
    // ------------------------------------------------------------------
    TransactionType transaction_type = 10;
    Channel         channel          = 11;
    Scheme          scheme           = 12;

    // ------------------------------------------------------------------
    // Network Reference
    // ------------------------------------------------------------------
    string rrn              = 13; // Retrieval Reference Number — 12 chars
}

// ------------------------------------------------------------------
// Enums — use enums instead of raw strings to catch typos at compile time
// ------------------------------------------------------------------

enum TransactionType {
    TRANSACTION_TYPE_UNSPECIFIED = 0;
    SALES                        = 1;
    VOID                         = 2;
    REFUND                       = 3;
    REVERSAL                     = 4;
}

enum Channel {
    CHANNEL_UNSPECIFIED = 0;
    POS                 = 1;
    PG                  = 2;  // Payment Gateway
}

enum Scheme {
    SCHEME_UNSPECIFIED = 0;
    MASTERCARD         = 1;
    VISA               = 2;
    AMEX               = 3;
    UNION_PAY          = 4;
}
